# =======================================================================
# Development Profile Configuration
# =======================================================================

# IBM MQ Configuration
mq.queue-manager=QM1
mq.channel=DEV.APP.SVRCONN
mq.connection-name=localhost(1414)
mq.user=app
mq.password=passw0rd
mq.license=accept
mq.connection-pool-size=10
mq.connection-timeout=30000

# Server Configuration
server.port=8081
server.servlet.context-path=/api

# Spring Boot Configuration
spring.application.name=spring-boot-ibm-mq-app

# JMS Configuration
spring.jms.provider-url=tcp://localhost:1414
spring.jms.user=app
spring.jms.password=passw0rd
spring.jms.listener.concurrency=5
spring.jms.listener.acknowledge-mode=CLIENT

# Application Queues
app.mq.request-queue=DEV.QUEUE.1
app.mq.response-queue=DEV.QUEUE.2
app.mq.error-queue=DEV.QUEUE.ERROR
app.mq.dead-letter-queue=DEV.DLQ

# Message Configuration
app.message.timeout=5000
app.message.retry-attempts=3
app.message.retry-delay=1000

# Logging
logging.level.root=INFO
logging.level.com.example.ibmmq=DEBUG
logging.level.org.springframework.jms=DEBUG
logging.level.com.ibm.mq=INFO
